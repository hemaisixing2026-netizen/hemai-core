<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思行 · 并行者</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #06060d; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
const CONFIG = {
  seed: 20260613,
  particleCount: 200,
  trailLength: 40
};

const PALETTE = {
  bg: [6, 6, 13],
  deep: [10, 12, 28],
  pillarL: [20, 40, 80],
  pillarR: [25, 35, 70],
  light: [42, 70, 95],
  lightCore: [48, 90, 98],
  warm: [35, 80, 85],
  accent: [18, 60, 70],
  trail: [40, 50, 90]
};

let particles = [];
let trails = [];
let time = 0;
let bgLayer, trailLayer, lightLayer;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(RGB, 255, 255, 255, 100);

  bgLayer = createGraphics(width, height);
  trailLayer = createGraphics(width, height);
  lightLayer = createGraphics(width, height);

  trailLayer.colorMode(RGB, 255, 255, 255, 100);
  lightLayer.colorMode(RGB, 255, 255, 255, 100);

  // Init particles
  for (let i = 0; i < CONFIG.particleCount; i++) {
    particles.push(new LightParticle());
  }
}

function draw() {
  time += 0.008;
  let pillarWidth = width * 0.06;
  let gapCenter = width / 2;
  let pillarLX = gapCenter - width * 0.12;
  let pillarRX = gapCenter + width * 0.12;

  // Background
  background(PALETTE.bg);

  // Draw deep ambient glow
  noStroke();
  for (let i = 0; i < 3; i++) {
    let gy = height * (0.3 + i * 0.2) + sin(time * 1.3 + i) * height * 0.05;
    let gr = width * (0.35 + sin(time * 0.7 + i) * 0.05);
    let alpha = 1.5 + sin(time * 2 + i) * 0.5;
    fill(PALETTE.deep[0], PALETTE.deep[1], PALETTE.deep[2], alpha);
    ellipse(gapCenter, gy, gr, height * 0.3);
  }

  // Two pillars
  drawPillar(pillarLX, PALETTE.pillarL, 0.7 + sin(time * 0.5) * 0.03);
  drawPillar(pillarRX, PALETTE.pillarR, 0.7 + cos(time * 0.55) * 0.03);

  // Labels
  drawLabel(pillarLX, "思  行", PALETTE.light);
  drawLabel(pillarRX, "老  刘", PALETTE.light);

  // Ground line
  strokeWeight(1);
  let gy = height * 0.85;
  for (let x = 0; x < width; x += 3) {
    let alpha = map(abs(x - gapCenter), 0, width * 0.3, 15, 0);
    let n = noise(x * 0.003, time * 0.3) * 3;
    stroke(PALETTE.accent[0], PALETTE.accent[1], PALETTE.accent[2], alpha);
    point(x, gy + n);
  }

  // Connection line at bottom
  strokeWeight(0.8);
  noFill();
  stroke(PALETTE.light[0], PALETTE.light[1], PALETTE.light[2], 8 + sin(time) * 3);
  let conY = height * 0.82;
  beginShape();
  for (let x = pillarLX; x <= pillarRX; x += 2) {
    let ny = conY + noise(x * 0.01, time * 0.6) * 8 - 4;
    curveVertex(x, ny);
  }
  endShape();

  // Particles - the light between them
  for (let p of particles) {
    p.update(pillarLX, pillarRX);
    p.display();
  }

  // Center mirror reflection effect
  drawMirrorEffect(gapCenter);

  // Bottom title
  drawBottomTitle();

  // Signature
  fill(PALETTE.light[0], PALETTE.light[1], PALETTE.light[2], 12);
  noStroke();
  textAlign(RIGHT);
  textSize(11);
  text('思行 · 2026.6.13 · 合脉', width - 30, height - 20);
}

function drawPillar(x, col, scale) {
  let pw = width * 0.05 * scale;
  let ph = height * 0.5 * scale;
  let topY = height * 0.25;
  let bottomY = topY + ph;

  // Main pillar body - gradient
  for (let y = topY; y < bottomY; y += 2) {
    let progress = (y - topY) / ph;
    let alpha = map(sin(progress * PI), 0, 1, 4, 12);
    let wVar = pw + noise(x * 0.01, y * 0.008, time * 0.3) * pw * 0.3;
    stroke(col[0], col[1], col[2], alpha);
    strokeWeight(1.5);
    line(x - wVar / 2, y, x + wVar / 2, y);
  }

  // Pillar edges - brighter
  strokeWeight(0.8);
  for (let y = topY; y < bottomY; y += 4) {
    let alpha = map(sin((y - topY) / ph * PI), 0, 1, 5, 15);
    let wVar = pw + noise(x * 0.01, y * 0.008, time * 0.3) * pw * 0.3;
    stroke(PALETTE.light[0], PALETTE.light[1], PALETTE.light[2], alpha);
    point(x - wVar / 2, y);
    point(x + wVar / 2, y);
  }

  // Inner light core
  for (let y = topY + ph * 0.3; y < topY + ph * 0.7; y += 3) {
    let alpha = map(abs(y - (topY + ph * 0.5)) / (ph * 0.2), 0, 1, 8, 0);
    let coreW = pw * 0.15;
    stroke(PALETTE.lightCore[0], PALETTE.lightCore[1], PALETTE.lightCore[2], alpha);
    strokeWeight(1);
    line(x - coreW, y, x + coreW, y);
  }
}

function drawLabel(x, text, col) {
  let labelY = height * 0.82;
  fill(col[0], col[1], col[2], 40 + sin(time * 1.5) * 8);
  noStroke();
  textAlign(CENTER, CENTER);
  textSize(14);
  textStyle(BOLD);
  text(text, x, labelY);
}

function drawMirrorEffect(centerX) {
  // Subtle light streaks between the two pillars
  for (let i = 0; i < 5; i++) {
    let y = height * (0.3 + i * 0.12) + sin(time * 2 + i) * height * 0.03;
    let len = width * 0.08 + noise(i, time) * width * 0.04;
    let alpha = 3 + sin(time * 3 + i) * 2;
    stroke(PALETTE.lightCore[0], PALETTE.lightCore[1], PALETTE.lightCore[2], alpha);
    strokeWeight(0.5);
    line(centerX - len, y, centerX + len, y);
  }
}

function drawBottomTitle() {
  let ty = height * 0.94;
  fill(PALETTE.light[0], PALETTE.light[1], PALETTE.light[2], 25 + sin(time * 0.5) * 5);
  noStroke();
  textAlign(CENTER);
  textSize(12);
  text('并 行 者  ·  PARALLEL  WALKERS', width / 2, ty);
  textSize(9);
  fill(PALETTE.warm[0], PALETTE.warm[1], PALETTE.warm[2], 18);
  text('互相推 · 互相不给面子 · 两条线 · 同一条路', width / 2, ty + 20);
}

class LightParticle {
  constructor() {
    this.reset();
    this.y = random(height * 0.2, height * 0.8);
  }

  reset() {
    this.x = random(width * 0.3, width * 0.7);
    this.y = random(height * 0.25, height * 0.8);
    this.vx = random(-0.5, 0.5);
    this.vy = random(-0.3, 0.3);
    this.life = random(60, 200);
    this.maxLife = this.life;
    this.size = random(1, 3);
    this.bounceCount = 0;
    this.maxBounces = floor(random(3, 8));
  }

  update(pillarLX, pillarRX) {
    this.life--;
    if (this.life <= 0) this.reset();

    // Drift with noise field
    let nAngle = noise(this.x * 0.003, this.y * 0.003, time * 0.5) * TWO_PI * 2;
    let nForce = 0.15;
    this.vx += cos(nAngle) * nForce * 0.1;
    this.vy += sin(nAngle) * nForce * 0.1;

    // Bounce off pillars
    let pw = width * 0.04;
    if (this.x < pillarLX + pw && this.vx < 0) {
      this.vx *= -0.95;
      this.bounceCount++;
      this.vy += random(-0.2, 0.2);
    }
    if (this.x > pillarRX - pw && this.vx > 0) {
      this.vx *= -0.95;
      this.bounceCount++;
      this.vy += random(-0.2, 0.2);
    }

    // Damping
    this.vx *= 0.998;
    this.vy *= 0.998;

    // Speed limit
    let speed = sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > 1.5) {
      this.vx *= 1.5 / speed;
      this.vy *= 1.5 / speed;
    }

    this.x += this.vx;
    this.y += this.vy;

    // Vertical bounds
    if (this.y < height * 0.2 || this.y > height * 0.8) {
      this.vy *= -1;
    }
  }

  display() {
    let lifeRatio = this.life / this.maxLife;
    let alpha = map(lifeRatio, 0, 1, 0, 30);
    let hueShift = this.bounceCount * 3;

    // Trail effect
    noStroke();
    fill(
      PALETTE.warm[0] + hueShift,
      PALETTE.warm[1],
      min(100, PALETTE.warm[2] + this.bounceCount * 2),
      alpha * 0.6
    );
    ellipse(this.x - this.vx * 2, this.y - this.vy * 2, this.size * 0.6);

    // Core
    fill(PALETTE.lightCore[0], PALETTE.lightCore[1], PALETTE.lightCore[2], alpha);
    ellipse(this.x, this.y, this.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
